name: Verbose Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # allow manual trigger

jobs:
  build-verbose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc clang make

      - name: Show environment info
        run: |
          echo "=== SYSTEM INFO ==="
          uname -a
          gcc --version
          clang --version
          make --version
          echo "=================="

      - name: Build with verbose compiler/linker flags
        run: |
          # Build with maximum verbosity:
          #   -v for compiler internal steps
          #   -Wl,--verbose for linker detailed output
          #   Also disable @ suppression by overriding Q (if any) – not needed.
          make termux
        continue-on-error: false

      - name: Archive build logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/obj/*.o
            build/dep/*.d
            build/bin/crive
            **/*.log
          if-no-files-found: ignore

      - name: Run built binary with version info
        run: |
          ./build/bin/crive --version
          echo "=== Build completed successfully ==="
