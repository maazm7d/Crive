name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  MAKEFLAGS: -j$(nproc)
  BUILD_PROFILE: release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build (${{ matrix.compiler }}, ${{ matrix.profile }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        profile: [release, debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc clang make \
            zip p7zip-full valgrind

      - name: System info
        run: |
          uname -a
          lscpu | head -10
          free -h

      - name: Build
        run: |
          make clean
          make CC=${{ matrix.compiler }} BUILD_PROFILE=${{ matrix.profile }} V=1 all

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: crive-${{ matrix.compiler }}-${{ matrix.profile }}
          path: build/bin/crive

  test:
    name: Functional Tests (Ultra Verbose)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip p7zip-full

      - name: Build (debug for max logs)
        run: |
          make clean
          make BUILD_PROFILE=debug CC=gcc V=1 all

      - name: ZIP Test (Ultra Verbose)
        run: |
          set -x

          echo "===== CREATE ZIP ====="
          echo "data" > file.txt
          zip -P pass123 test.zip file.txt

          echo "===== CREATE WORDLIST ====="
          echo "wrong" > wordlist.txt
          echo "pass123" >> wordlist.txt

          echo "===== RUN CRIVE ====="
          ./build/bin/crive test.zip \
            --wordlist wordlist.txt \
            --threads 1 \
            --verbose \
            > zip.log 2>&1 || true

          echo "===== FULL LOG ====="
          cat zip.log

          echo "===== VALIDATION ====="
          grep -q "pass123" zip.log

      - name: 7Z Test (Ultra Verbose)
        run: |
          set -x

          echo "===== CREATE 7Z ====="
          echo "data" > file.txt
          7z a -psecret7z test.7z file.txt

          echo "===== CREATE WORDLIST ====="
          echo "badpass" > wordlist.txt
          echo "secret7z" >> wordlist.txt

          echo "===== RUN CRIVE ====="
          ./build/bin/crive test.7z \
            --wordlist wordlist.txt \
            --threads 1 \
            --verbose \
            > 7z.log 2>&1 || true

          echo "===== FULL LOG ====="
          cat 7z.log

          echo "===== VALIDATION ====="
          grep -q "secret7z" 7z.log

      - name: Benchmark (Verbose)
        run: |
          set -x
          ./build/bin/crive --benchmark 5 --threads 1 > bench.log 2>&1 || true
          cat bench.log

  valgrind:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind zip p7zip-full

      - name: Build debug
        run: |
          make clean
          make BUILD_PROFILE=debug CC=gcc all

      - name: Run Valgrind (Ultra Verbose)
        run: |
          set -x
          valgrind \
            --leak-check=full \
            --track-origins=yes \
            --verbose \
            ./build/bin/crive --help \
            > valgrind.log 2>&1 || true

          echo "===== VALGRIND LOG ====="
          cat valgrind.log

      - name: Upload valgrind log
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: valgrind.log

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make BUILD_PROFILE=release CC=gcc all

      - name: Run benchmark
        run: |
          ./build/bin/crive --benchmark 10 --threads 1 > benchmark.log 2>&1 || true
          cat benchmark.log

      - name: Extract speed
        run: |
          grep -i "passwords/sec" benchmark.log || true

  final:
    name: Final Status
    runs-on: ubuntu-latest
    needs: [build, test, valgrind, benchmark]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "Build:     ${{ needs.build.result }}"
          echo "Test:      ${{ needs.test.result }}"
          echo "Valgrind:  ${{ needs.valgrind.result }}"
          echo "Benchmark: ${{ needs.benchmark.result }}"
